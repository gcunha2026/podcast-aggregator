name: Aggregate podcast feeds

on:
  schedule:
    - cron: "0 12 * * *"   # daily 12:00 UTC (09:00 BRT)
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - run: python -m pip install -r requirements.txt

      - run: python aggregate.py

      - name: Commit feed.xml if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if (git status --porcelain feed.xml) {
            git add feed.xml
            git commit -m "chore: update aggregated feed"
            git push
          } else {
            Write-Host "No changes in feed.xml"
          }
