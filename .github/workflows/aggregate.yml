name: Aggregate podcast feeds

on:
  schedule:
    - cron: "0 12 * * *"   # daily 12:00 UTC (09:00 BRT)
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -r requirements.txt
        shell: bash

      - run: python aggregate.py
        shell: bash

      - name: Commit feed.xml if changed
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain feed.xml)" ]]; then
            git add feed.xml
            git commit -m "chore: update aggregated feed"
            git push
          else
            echo "No changes in feed.xml"
          fi
